# ==============================================================================
# MES Application Configuration
# File: app_config.yaml
# ==============================================================================
# This file contains every parameter an administrator may need to change when
# installing, deploying, or maintaining the MES application.
#
# HOW TO USE
#   1. Fill in the values below for your Business Central instance.
#   2. This file is bundled inside the app (declared as a Flutter asset).
#      For sensitive credentials (passwords, secrets) in production, consider
#      a secrets management approach — see the Security note at the bottom.
#   3. After editing this file, hot-restart the app for changes to take effect.
#
# LOADING IN FLUTTER
#   Loaded once at startup via AppConfig.load() in main.dart.
#   All values are then accessed through AppConfig.<property> throughout the app.
#   Never read this file directly — always use AppConfig.
# ==============================================================================


# ------------------------------------------------------------------------------
# Business Central Connection
# ------------------------------------------------------------------------------

bc:
  # Base URL of your BC instance. No trailing slash.
  #
  # On-premises example:
  #   base_url: "http://192.168.1.50:7048/BC210"
  #
  # BC SaaS (cloud) example:
  #   base_url: "https://api.businesscentral.dynamics.com/v2.0/<tenantId>/<environment>"
  base_url: "http://localhost:7048/BC210"

  # The BC company to run all API calls against.
  # Find your company name via: GET <base_url>/ODataV4/Company
  # Leave blank only if your tenant has exactly one company (BC auto-selects it).
  company_name: "CRONUS International Ltd."

  # OData web service name as registered in BC Web Services.
  # Must match the ServiceName in WebServices.xml.
  odata_service_name: "MESUnboundActions"

  # Machine actions web service name (MESMachineActions codeunit).
  machine_service_name: "MESMachineActions"

  # Custom API metadata — must match the AL page APIPublisher / APIGroup / APIVersion.
  api_publisher: "yourcompany"
  api_group: "v1"
  api_version: "v1.0"


# ------------------------------------------------------------------------------
# Authentication
# ------------------------------------------------------------------------------

auth:
  # On-premises: Windows / Basic auth credentials used to call BC OData.
  # For BC SaaS with OAuth, leave these blank and fill in the oauth section.
  bc_username: ""
  bc_password: ""


# ------------------------------------------------------------------------------
# OAuth  (BC SaaS / Azure AD — leave all blank for on-premises Basic auth)
# ------------------------------------------------------------------------------

oauth:
  tenant_id: ""
  client_id: ""
  # WARNING: storing client_secret in a bundled config file is acceptable for
  # internal/factory-floor apps, but review your organisation's security policy.
  client_secret: ""
  scope: "https://api.businesscentral.dynamics.com/.default"


# ------------------------------------------------------------------------------
# Network & Timeouts
# ------------------------------------------------------------------------------

network:
  # Seconds to wait to establish a TCP connection to BC.
  connect_timeout_seconds: 10

  # Seconds to wait for BC to return a response after connecting.
  receive_timeout_seconds: 30


# ------------------------------------------------------------------------------
# Session
# ------------------------------------------------------------------------------

session:
  # Minutes before the token's server-side expiry at which the app should warn
  # the user that their session is about to expire.
  expiry_warning_minutes: 30

  # Identifier for this device sent with every Login request.
  # Used in the BC audit trail to identify which tablet or scanner logged in.
  # Use a descriptive, unique value per physical device,
  # e.g. "tablet-assembly-01", "scanner-warehouse-03".
  device_id: "mes-device-001"


# ------------------------------------------------------------------------------
# Feature Flags
# ------------------------------------------------------------------------------

features:
  # Set to true to log full HTTP request/response details to the console.
  # DISABLE in production — may expose tokens or credentials in logs.
  enable_http_logging: false

  # Set to true to show a diagnostics/debug screen accessible from the login page.
  # Useful during installation to verify connectivity to BC.
  enable_debug_screen: false

  # Set to true to allow the operator to manually refresh the machine list.
  # When false, the list auto-refreshes on a timer only.
  enable_manual_machine_refresh: true

  # Auto-refresh interval for the machine list screen, in seconds.
  # Set to 0 to disable auto-refresh entirely.
  machine_list_refresh_seconds: 30
